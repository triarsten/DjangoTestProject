global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    app: djangotestproject

scrape_configs:
  # Django App (django-prometheus /metrics Endpoint)
  - job_name: djangotestproject
    static_configs:
      - targets: ["web:8000"]
    metrics_path: /metrics

  # OTEL Collector eigene Metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
