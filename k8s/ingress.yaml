apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: djangotestproject
  namespace: staging
  labels:
    app: djangotestproject
    environment: staging
  annotations:
    # Traefik-spezifische Annotations
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Für HTTPS (falls Traefik mit cert-manager konfiguriert):
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: django-staging.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: djangotestproject
                port:
                  number: 8000
