name: Deploy Staging

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Deployments nie abbrechen – lieber sequenziell

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/triarsten/djangotestproject/app

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Docker Image bauen und zu ghcr.io pushen
  # Läuft auf: ubuntu-latest (GitHub-hosted)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # Für ghcr.io Push

    outputs:
      image-tag: ${{ github.sha }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata extrahieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Image bauen und pushen
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref_name }}

      - name: Image-Digest zusammenfassen
        run: |
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 2: Deployment auf K3s
  # Läuft auf: self-hosted Runner (hat kubectl + kubeconfig für das Homelab)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to K3s (Staging)
    runs-on: self-hosted
    needs: build-and-push
    environment:
      name: staging
      url: http://django-staging.homelab.local

    steps:
      - uses: actions/checkout@v4

      - name: Image-Tag im Deployment setzen
        run: |
          # Ersetze :latest durch den konkreten SHA-Tag für deterministisches Deployment
          IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|image: .*djangotestproject.*|image: ${IMAGE}|g" k8s/deployment.yaml
          echo "Deploye Image: ${IMAGE}"

      - name: Namespace sicherstellen
        run: kubectl apply -f k8s/namespace.yaml

      - name: PostgreSQL ExternalName Service anwenden
        run: kubectl apply -f k8s/external-postgres-service.yaml

      - name: Kubernetes Manifeste anwenden
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Rollout abwarten
        run: |
          kubectl rollout status deployment/djangotestproject \
            --namespace staging \
            --timeout=300s

      - name: Deployment verifizieren
        run: |
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n staging -l app=djangotestproject \
            --no-headers \
            -o custom-columns="POD:.metadata.name,STATUS:.status.phase,READY:.status.containerStatuses[0].ready" \
            >> $GITHUB_STEP_SUMMARY || true

      - name: Health-Check nach Deployment
        run: |
          # Warte kurz und prüfe /health/ über den internen Service
          sleep 10
          kubectl run health-check \
            --image=curlimages/curl:latest \
            --restart=Never \
            --rm \
            --namespace staging \
            --attach \
            --quiet \
            -- curl -sf http://djangotestproject:8000/health/ \
          && echo "Health-Check erfolgreich" \
          || echo "Health-Check fehlgeschlagen (nicht blockierend)"

      - name: Rollback bei Fehler
        if: failure()
        run: |
          echo "Deployment fehlgeschlagen – führe Rollback durch..."
          kubectl rollout undo deployment/djangotestproject --namespace staging
          kubectl rollout status deployment/djangotestproject --namespace staging --timeout=120s
