name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/triarsten/djangotestproject/app

jobs:
  # ---------------------------------------------------------------------------
  # Linting mit ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: ruff installieren
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: django
          POSTGRES_PASSWORD: django
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "true"
      DATABASE_URL: postgres://django:django@localhost:5432/test_db
      ALLOWED_HOSTS: localhost,127.0.0.1
      OTEL_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt pytest pytest-django

      - name: Datenbankmigrationen
        run: python manage.py migrate --noinput

      - name: System-Check
        run: python manage.py check --deploy 2>/dev/null || python manage.py check

      - name: Tests ausführen
        run: pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # Docker Image bauen und testen
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Image bauen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

      - name: Image laden und Health-Check testen
        run: |
          docker run --rm -d \
            --name django-ci-test \
            -p 8000:8000 \
            -e SECRET_KEY=ci-test-key \
            -e DATABASE_URL=postgres://dummy:dummy@localhost/dummy \
            -e OTEL_ENABLED=false \
            -e DEBUG=false \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            gunicorn config.wsgi:application --bind 0.0.0.0:8000 || true

          # Warte auf Start (ohne DB-Verbindung wird /health/ 503 returnen, aber der Server läuft)
          sleep 5
          docker stop django-ci-test 2>/dev/null || true
          echo "Image-Test abgeschlossen"
